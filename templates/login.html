{% extends "base.html" %}
{% block title %}Anmelden – Verfügbarkeitsplaner{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card panel">
    <p class="eyebrow">Willkommen zurück</p>
    <h1>Anmelden</h1>
    <p class="auth-sub">Melde dich mit deinem Benutzernamen an.</p>

    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>
        <span>Benutzername</span>
        <input type="text" name="username" value="{{ username or '' }}" autocomplete="username" required autofocus>
      </label>
      <label>
        <span>Passwort</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="btn primary" type="submit">Anmelden</button>
    </form>

    <p class="auth-switch">Noch kein Konto? <a href="{{ url_for('register') }}">Jetzt registrieren</a></p>
  </div>
</div>
{% endblock %}
